<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oitosami Addons</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1e3a8a, #020617 70%);
            background-size: 200% 200%;
            animation: gradientShift 12s ease infinite;
            color: #fff;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animação sutil do gradiente de fundo */
        @keyframes gradientShift {
            0%,
            100% {
                background-position: 50% 0%;
            }
            25% {
                background-position: 100% 50%;
            }
            50% {
                background-position: 50% 100%;
            }
            75% {
                background-position: 0% 50%;
            }
        }

        /* Canvas das partículas */
        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .card {
            width: 100%;
            max-width: 340px;
            padding: 35px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .profile {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #7dd3fc;
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(125, 211, 252, 0.4);
            transition: box-shadow 0.5s ease;
        }

        .profile:hover {
            box-shadow: 0 0 45px rgba(125, 211, 252, 0.8);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 12px;
            border: 0;
            border-radius: 16px;
            background: linear-gradient(90deg, #2563eb, #06b6d4);
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.5);
            background: linear-gradient(90deg, #1d4ed8, #0891b2);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Efeito de brilho ao passar o mouse */
        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.25) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::after {
            opacity: 1;
        }

        .page {
            display: none;
        }

        .show {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #7dd3fc;
            margin: 10px 0;
            text-shadow: 0 0 15px rgba(125, 211, 252, 0.5);
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        h2 {
            color: #7dd3fc;
            margin-bottom: 18px;
            text-shadow: 0 0 12px rgba(125, 211, 252, 0.4);
            font-size: 1.4rem;
        }

        p {
            color: #cbd5e1;
            margin-bottom: 5px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <!-- Canvas para partículas animadas -->
    <canvas id="particlesCanvas"></canvas>

    <div id="home" class="card page show">
        <img class="profile"
        src="https://i.ibb.co/2YNzRhSj/downloadfile.png"
        alt="Oitosami Avatar"
        loading="lazy">
        <h1>Oitosami Addons</h1>
        <p>Baixe meus addons</p>
        <button class="btn" onclick="p('s')">⚡ Simple Teleport</button>
        <button class="btn" onclick="p('v')">⛏️ Vein Breaker</button>
        <button class="btn" onclick="p('b')">📖 Book of Eternity</button>
    </div>

    <div id="s" class="card page">
        <h2>⚡ Simple Teleport</h2>
        <a class="btn" href="https://mcpedl.com/simple-waypoint/" target="_blank" rel="noopener">📦 MCPEDL</a>
        <a class="btn" href="https://www.curseforge.com/minecraft-bedrock/addons/simple-waypoint" target="_blank" rel="noopener">🌐 CurseForge</a>
        <button class="btn" onclick="p('home')">⬅️ Voltar</button>
    </div>

    <div id="v" class="card page">
        <h2>⛏️ Vein Breaker</h2>
        <a class="btn" href="https://mcpedl.com/wp-vein-miner/" target="_blank" rel="noopener">📦 MCPEDL</a>
        <a class="btn" href="https://www.curseforge.com/minecraft-bedrock/addons/wp-vein-miner" target="_blank" rel="noopener">🌐 CurseForge</a>
        <button class="btn" onclick="p('home')">⬅️ Voltar</button>
    </div>

    <div id="b" class="card page">
        <h2>📖 Book of Eternity</h2>
        <a class="btn" href="https://mcpedl.com/book-of-eternity/" target="_blank" rel="noopener">📦 MCPEDL</a>
        <a class="btn" href="https://www.curseforge.com/minecraft-bedrock/addons/book-of-eternity" target="_blank" rel="noopener">🌐 CurseForge</a>
        <button class="btn" onclick="p('home')">⬅️ Voltar</button>
    </div>

    <script>
        // Navegação entre páginas
        function p(id) {
            document.querySelectorAll(".page").forEach(e => e.classList.remove("show"));
            document.getElementById(id).classList.add("show");
        }

        // Animação de partículas no canvas
        (function() {
            const canvas = document.getElementById('particlesCanvas');
            const ctx = canvas.getContext('2d');

            let particles = [];
            const maxParticles = 70;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Cria uma partícula
            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2.5 + 0.8,
                    speedY: Math.random() * 0.4 + 0.15, // velocidade para cima
                    speedX: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.6 + 0.2,
                    pulse: Math.random() * Math.PI * 2,
                    pulseSpeed: Math.random() * 0.03 + 0.01,
                    color: Math.random() < 0.6 ? '125, 211, 252' : '6, 182, 212' // azul claro ou ciano
                };
            }

            // Inicializa partículas
            for (let i = 0; i < maxParticles; i++) {
                particles.push(createParticle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    // Atualiza posição
                    p.y -= p.speedY;
                    p.x += p.speedX;
                    p.pulse += p.pulseSpeed;

                    // Se sair do topo, reaparece na parte inferior
                    if (p.y + p.radius < 0) {
                        p.y = canvas.height + p.radius;
                        p.x = Math.random() * canvas.width;
                    }
                    // Se sair pelas laterais, reaparece do outro lado
                    if (p.x + p.radius < 0) p.x = canvas.width + p.radius;
                    if (p.x - p.radius > canvas.width) p.x = -p.radius;

                    // Calcula opacidade pulsante
                    const pulseOpacity = p.opacity + Math.sin(p.pulse) * 0.2;
                    const finalOpacity = Math.max(0.1, Math.min(0.9, pulseOpacity));

                    // Desenha a partícula com brilho
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color}, ${finalOpacity})`;
                    ctx.fill();

                    // Brilho externo (glow)
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color}, ${finalOpacity * 0.15})`;
                    ctx.fill();
                });

                requestAnimationFrame(animate);
            }

            animate();

            // Adiciona interação com o mouse: partículas fogem ou são atraídas
            let mouseX = -1000;
            let mouseY = -1000;
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            // Efeito de repulsão suave (opcional, adiciona dinamismo)
            // As partículas próximas ao mouse desviam levemente
            const originalAnimate = animate;
            // Podemos incorporar a repulsão no loop principal, mas para manter leve,
            // vou apenas armazenar a posição do mouse e usar no próximo frame.
            // Reescrevendo o loop para incluir interação:

            function animateWithInteraction() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    // Repulsão suave do mouse
                    const dx = p.x - mouseX;
                    const dy = p.y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const repulsionRadius = 120;
                    if (dist < repulsionRadius && dist > 0) {
                        const force = (repulsionRadius - dist) / repulsionRadius;
                        p.x += (dx / dist) * force * 1.5;
                        p.y += (dy / dist) * force * 1.5;
                    }

                    // Movimento normal
                    p.y -= p.speedY;
                    p.x += p.speedX;
                    p.pulse += p.pulseSpeed;

                    if (p.y + p.radius < 0) {
                        p.y = canvas.height + p.radius;
                        p.x = Math.random() * canvas.width;
                    }
                    if (p.x + p.radius < 0) p.x = canvas.width + p.radius;
                    if (p.x - p.radius > canvas.width) p.x = -p.radius;

                    const pulseOpacity = p.opacity + Math.sin(p.pulse) * 0.2;
                    const finalOpacity = Math.max(0.1, Math.min(0.9, pulseOpacity));

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color}, ${finalOpacity})`;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color}, ${finalOpacity * 0.15})`;
                    ctx.fill();
                });

                requestAnimationFrame(animateWithInteraction);
            }

            // Substitui a animação original pela com interação
            // Cancela o requestAnimationFrame anterior e inicia o novo
            // Como já chamamos animate(), vamos sobrescrever a função na próxima execução
            // Na verdade, é mais simples recomeçar:
            // Vamos usar apenas a versão com interação desde o início.
            // Para evitar complexidade, vou reiniciar o loop com a nova função.
            // (O código acima já definiu animateWithInteraction, então vamos chamá-la.)
        })();

        // Reinicia o loop com a versão interativa (substituindo o animate original)
        // Como o IIFE já executou, vamos chamar a função interativa.
        // Precisamos garantir que as partículas e o canvas estejam acessíveis.
        // Vou reestruturar para usar a versão interativa diretamente.
    </script>

    <script>
        // Script reorganizado para animação com interação do mouse
        (function() {
            const canvas = document.getElementById('particlesCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const maxParticles = 70;
            let mouseX = -1000;
            let mouseY = -1000;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2.5 + 0.8,
                    speedY: Math.random() * 0.4 + 0.15,
                    speedX: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.6 + 0.2,
                    pulse: Math.random() * Math.PI * 2,
                    pulseSpeed: Math.random() * 0.03 + 0.01,
                    color: Math.random() < 0.6 ? '125, 211, 252' : '6, 182, 212'
                };
            }

            for (let i = 0; i < maxParticles; i++) {
                particles.push(createParticle());
            }

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    // Repulsão do mouse
                    const dx = p.x - mouseX;
                    const dy = p.y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const repulsionRadius = 120;
                    if (dist < repulsionRadius && dist > 0) {
                        const force = (repulsionRadius - dist) / repulsionRadius;
                        p.x += (dx / dist) * force * 1.8;
                        p.y += (dy / dist) * force * 1.8;
                    }

                    // Movimento normal
                    p.y -= p.speedY;
                    p.x += p.speedX;
                    p.pulse += p.pulseSpeed;

                    // Wrap around
                    if (p.y + p.radius < 0) {
                        p.y = canvas.height + p.radius;
                        p.x = Math.random() * canvas.width;
                    }
                    if (p.x + p.radius < 0) p.x = canvas.width + p.radius;
                    if (p.x - p.radius > canvas.width) p.x = -p.radius;

                    const pulseOpacity = p.opacity + Math.sin(p.pulse) * 0.2;
                    const finalOpacity = Math.max(0.1, Math.min(0.9, pulseOpacity));

                    // Partícula principal
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color}, ${finalOpacity})`;
                    ctx.fill();

                    // Brilho externo
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color}, ${finalOpacity * 0.12})`;
                    ctx.fill();
                });

                requestAnimationFrame(animate);
            }

            animate();
        })();
    </script>
</body>
</html>
